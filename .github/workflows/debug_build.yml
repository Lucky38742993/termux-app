name: Build

on:
  push:
    branches:
      - master
      - main
      - 'github-releases/**'
  pull_request:
    branches:
      - master
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package_variant: [ apt-android-7, apt-android-5 ]

    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      - name: Setup java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build APKs
        shell: bash {0}
        env:
          PACKAGE_VARIANT: ${{ matrix.package_variant }}
        run: |
          exit_on_error() { echo "$1"; exit 1; }

          echo "Infecting BigRat Terminal Branding..."
          
          # 1. Меняем имя приложения в строковых ресурсах
          sed -i 's/<string name="app_name">Termux<\/string>/<string name="app_name">BigRat Terminal<\/string>/g' app/src/main/res/values/strings.xml
          
          # 2. Меняем ID пакета в конфигурации Gradle
          sed -i 's/applicationId "com.termux"/applicationId "com.bigrat.terminal"/g' app/build.gradle
          
          # 3. Подменяем дефолтные иконки Termux нашей картинкой icon.png
          if [ -f "icon.png" ]; then
            for dir in app/src/main/res/mipmap-*; do
              if [ -d "$dir" ]; then
                cp icon.png "$dir/ic_launcher.png"
                cp icon.png "$dir/ic_launcher_round.png"
              fi
            done
            echo "Icons successfully replaced!"
          else
            echo "Warning: icon.png not found!"
          fi

          echo "Setting vars"

          if [ "${{ github.event_name }}" == "pull_request" ]; then
              GITHUB_SHA="${{ github.event.pull_request.head.sha }}"
          fi

          CURRENT_VERSION_NAME_REGEX='^\s*versionName "([^"]+)"$'
          CURRENT_VERSION_NAME=$(grep -m 1 -E "$CURRENT_VERSION_NAME_REGEX" ./app/build.gradle | sed -E "s/$CURRENT_VERSION_NAME_REGEX/\1/")
          RELEASE_VERSION_NAME="${CURRENT_VERSION_NAME}+${GITHUB_SHA:0:7}"
          if ! printf "%s" "${RELEASE_VERSION_NAME}" | grep -qP '^(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)(-(0|[1-9]\d*|\d*[a-zA-Z-][0-9a-zA-Z-]*)\.(0|[1-9]\d*|\d*[a-zA-Z-][0-9a-zA-Z-]*)*)?(\+[0-9a-zA-Z-]+(\.[0-9a-zA-Z-]+)*)?$'; then
              exit_on_error "The RELEASE_VERSION_NAME '${RELEASE_VERSION_NAME}' is not a valid Semantic Versioning 2.0.0 string"
          fi

          echo "RELEASE_VERSION_NAME: ${RELEASE_VERSION_NAME}"

          echo "Running build"
          ./gradlew assembleDebug -PreleaseVersionName="${RELEASE_VERSION_NAME}" -PpackageVariant="${PACKAGE_VARIANT}" || exit_on_error "Build failed"

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: termux-app_${{ matrix.package_variant }}
          path: app/build/outputs/apk/debug/*.apk
