name: Build BigRat Terminal

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Inject BigRat Branding
        run: |
          echo "Applying name and package modifications..."
          # Меняем имя приложения
          sed -i 's/<string name="app_name">Termux<\/string>/<string name="app_name">BigRat Terminal<\/string>/g' app/src/main/res/values/strings.xml
          
          # Меняем ID пакета, чтобы не конфликтовать с оригиналом
          sed -i 's/applicationId "com.termux"/applicationId "com.bigrat.terminal"/g' app/build.gradle

          # Подменяем иконки
          if [ -f "icon.png" ]; then
            for dir in app/src/main/res/mipmap-*; do
              if [ -d "$dir" ]; then
                cp icon.png "$dir/ic_launcher.png"
                cp icon.png "$dir/ic_launcher_round.png"
              fi
            done
            echo "Icons replaced successfully."
          else
            echo "icon.png missing, using default icons."
          fi

      - name: Build with Gradle
        run: |
          chmod +x gradlew
          # Убран -x checkstyle, оставлены только базовые исключения тестов
          ./gradlew assembleDebug -x test -x lint -PreleaseVersionName="1.0.0-bigrat"

      - name: Upload BigRat Terminal APK
        uses: actions/upload-artifact@v4
        with:
          name: BigRat-Terminal-APKs
          path: app/build/outputs/apk/debug/*.apk
