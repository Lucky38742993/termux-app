name: Build BigRat Terminal

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Inject BigRat Branding
        run: |
          echo "Deep patching all Termux references..."
          find app/src/ -type f -name "strings.xml" -exec sed -i 's/>Termux</>BigRat Terminal</g' {} +
          find app/src/ -type f -name "AndroidManifest.xml" -exec sed -i 's/android:label="Termux"/android:label="BigRat Terminal"/g' {} +
          sed -i 's/applicationId "com.termux"/applicationId "com.bigrat.terminal"/g' app/build.gradle
          sed -i 's/applicationIdSuffix ".debug"//g' app/build.gradle
          sed -i 's/com.termux.debug/com.bigrat.terminal/g' app/build.gradle

          if [ -f "icon.png" ]; then
            echo "Forcing icon replacement everywhere..."
            find app/src/ -name "ic_launcher*.xml" -delete
            find app/src/ -name "ic_launcher*.webp" -delete
            for dir in $(find app/src/ -type d -name "mipmap-*"); do
              cp icon.png "$dir/ic_launcher.png"
              cp icon.png "$dir/ic_launcher_round.png"
            done
            echo "All icons overwritten."
          fi

      - name: Build with Gradle
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon -x test -x lint

      - name: Upload BigRat APK
        uses: actions/upload-artifact@v4
        with:
          name: BigRat-Terminal-APK
          path: app/build/outputs/apk/debug/*.apk
