name: Build BigRat Terminal

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Inject BigRat Branding
        run: |
          echo "Applying name and package modifications..."
          sed -i 's/<string name="app_name">Termux<\/string>/<string name="app_name">BigRat Terminal<\/string>/g' app/src/main/res/values/strings.xml
          sed -i 's/applicationId "com.termux"/applicationId "com.bigrat.terminal"/g' app/build.gradle

          if [ -f "icon.png" ]; then
            echo "Cleaning up old XML launcher resources to prevent duplication..."
            find app/src/main/res/ -name "ic_launcher*.xml" -delete
            
            for dir in app/src/main/res/mipmap-*; do
              if [ -d "$dir" ]; then
                cp icon.png "$dir/ic_launcher.png"
                cp icon.png "$dir/ic_launcher_round.png"
              fi
            done
            echo "Icons replaced successfully."
          fi

      - name: Build with Gradle
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon -x test -x lint

      - name: Upload BigRat APK
        uses: actions/upload-artifact@v4
        with:
          name: BigRat-Terminal-APK
          path: app/build/outputs/apk/debug/*.apk
